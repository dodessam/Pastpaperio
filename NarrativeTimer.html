<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exam Timer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background:
                radial-gradient(1200px 600px at 10% -10%, rgba(255,255,255,0.08), transparent 45%),
                radial-gradient(900px 500px at 110% 120%, rgba(255,255,255,0.06), transparent 45%),
                #0b0d10;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 24px;
            color: #f2f4f7;
        }
        
        .container {
            background: rgba(18, 22, 28, 0.92);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            padding: 30px;
            border-radius: 24px;
            box-shadow: 0 24px 64px rgba(0,0,0,0.5);
            max-width: 560px;
            width: 100%;
            border: 1px solid rgba(255,255,255,0.08);
        }
        
        h1 {
            text-align: center;
            color: #ffffff;
            margin-bottom: 24px;
            font-size: 30px;
            letter-spacing: 0.3px;
        }
        
        .input-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            color: #c6ced9;
            font-weight: 600;
            font-size: 14px;
            letter-spacing: 0.2px;
        }
        
        input {
            width: 100%;
            padding: 13px 14px;
            border: 1px solid #2b3340;
            border-radius: 12px;
            font-size: 16px;
            transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
            background: #0f141b;
            color: #f2f4f7;
        }
        
        input:focus {
            outline: none;
            border-color: #7c8ea8;
            box-shadow: 0 0 0 4px rgba(124,142,168,0.18);
            background: #121923;
        }
        
        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(180deg, #f4f7fb 0%, #d7dee8 100%);
            color: #111722;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.14s ease, box-shadow 0.2s ease, opacity 0.2s;
            margin-top: 10px;
            box-shadow: 0 10px 24px rgba(0,0,0,0.25);
        }
        
        button:hover {
            transform: translateY(-1px);
            box-shadow: 0 14px 28px rgba(0,0,0,0.3);
        }
        
        button:disabled {
            background: #39414d;
            color: #8c97a8;
            cursor: not-allowed;
            box-shadow: none;
        }
        
        .timer-display {
            font-size: 72px;
            text-align: center;
            color: #ffffff;
            font-weight: bold;
            margin: 30px 0;
            font-family: 'Courier New', monospace;
            letter-spacing: 2px;
            text-shadow: 0 4px 14px rgba(255,255,255,0.12);
        }
        
        .status {
            text-align: center;
            font-size: 16px;
            color: #c6ced9;
            margin: 20px 0;
            min-height: 30px;
        }
        
        .announcement {
            background: #101721;
            border: 1px solid #2a3342;
            padding: 15px;
            border-radius: 12px;
            text-align: center;
            color: #d5e3f5;
            font-weight: 600;
            margin: 20px 0;
            min-height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Exam Timer</h1>
        
        <div id="setup" class="setup">
            <div class="input-group">
                <label for="duration">Duration (minutes):</label>
                <input type="number" id="duration" min="1" value="60" required>
            </div>
            
            <button onclick="scheduleTimer()">Start At Next Minute</button>
        </div>
        
        <div id="waiting" class="hidden">
            <div class="status">Waiting for next minute start...</div>
            <div class="timer-display" id="countdown">--:--:--</div>
            <button onclick="cancelTimer()">Cancel</button>
        </div>
        
        <div id="running" class="hidden">
            <div class="announcement" id="announcement"></div>
            <div class="timer-display" id="timer">00:00</div>
            <div class="status" id="status"></div>
            <button onclick="stopTimer()">Stop Timer</button>
        </div>
        
        <div id="finished" class="hidden">
            <div class="announcement">Time's up! Pens down.</div>
            <div class="timer-display">00:00</div>
            <button onclick="resetTimer()">New Timer</button>
        </div>
    </div>

    <script>
        let scheduledInterval = null;
        let timerInterval = null;
        let endTime = null;
        let durationMinutes = 0;
        let halfTimeAnnounced = false;
        let fiveMinAnnounced = false;

        function speak(text) {
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.rate = 0.9;
            utterance.pitch = 1;
            utterance.volume = 1;
            
            const voices = speechSynthesis.getVoices();
            const femaleVoice = voices.find(voice => 
                voice.name.includes('Female') || 
                voice.name.includes('female') ||
                voice.name.includes('Samantha') ||
                voice.name.includes('Victoria') ||
                voice.name.includes('Karen') ||
                voice.name.includes('Zira')
            );
            
            if (femaleVoice) {
                utterance.voice = femaleVoice;
            }
            
            speechSynthesis.speak(utterance);
        }

        function scheduleTimer() {
            const duration = parseInt(document.getElementById('duration').value);
            
            if (!duration) {
                alert('Please enter duration');
                return;
            }
            
            durationMinutes = duration;

            const now = new Date();
            const scheduledTime = new Date(now);
            scheduledTime.setSeconds(0, 0);
            scheduledTime.setMinutes(scheduledTime.getMinutes() + 1);
            
            document.getElementById('setup').classList.add('hidden');
            document.getElementById('waiting').classList.remove('hidden');
            
            scheduledInterval = setInterval(() => {
                const diff = scheduledTime - new Date();
                
                if (diff <= 0) {
                    clearInterval(scheduledInterval);
                    startTimer(duration);
                } else {
                    const hours = Math.floor(diff / 3600000);
                    const mins = Math.floor((diff % 3600000) / 60000);
                    const secs = Math.floor((diff % 60000) / 1000);
                    document.getElementById('countdown').textContent = 
                        `${String(hours).padStart(2, '0')}:${String(mins).padStart(2, '0')}:${String(secs).padStart(2, '0')}`;
                }
            }, 100);
        }

        function startTimer(duration) {
            document.getElementById('waiting').classList.add('hidden');
            document.getElementById('running').classList.remove('hidden');
            
            const announcement = document.getElementById('announcement');
            announcement.textContent = 'On behalf of the British Council, we wish you all good luck. You may start.';
            speak('On behalf of the British Council, we wish you all good luck. You may start.');
            
            endTime = new Date(Date.now() + duration * 60000);
            halfTimeAnnounced = false;
            fiveMinAnnounced = false;
            
            updateTimer();
            timerInterval = setInterval(updateTimer, 100);
        }

        function updateTimer() {
            const now = new Date();
            const remaining = endTime - now;
            
            if (remaining <= 0) {
                clearInterval(timerInterval);
                finishTimer();
                return;
            }
            
            const totalMinutes = Math.floor(remaining / 60000);
            const seconds = Math.floor((remaining % 60000) / 1000);
            
            document.getElementById('timer').textContent = 
                `${String(totalMinutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
            
            const elapsed = durationMinutes * 60000 - remaining;
            const halfTime = durationMinutes * 30000;
            
            const announcement = document.getElementById('announcement');
            
            if (!halfTimeAnnounced && elapsed >= halfTime) {
                halfTimeAnnounced = true;
                announcement.textContent = 'Half of the time has passed';
                speak('Half of the time has passed');
            }
            
            if (!fiveMinAnnounced && remaining <= 300000 && remaining > 299000) {
                fiveMinAnnounced = true;
                announcement.textContent = '5 minutes remaining';
                speak('5 minutes remaining');
            }
        }

        function finishTimer() {
            document.getElementById('running').classList.add('hidden');
            document.getElementById('finished').classList.remove('hidden');
            speak('Pens down');
        }

        function stopTimer() {
            if (timerInterval) {
                clearInterval(timerInterval);
            }
            resetTimer();
        }

        function cancelTimer() {
            if (scheduledInterval) {
                clearInterval(scheduledInterval);
            }
            resetTimer();
        }

        function resetTimer() {
            if (scheduledInterval) clearInterval(scheduledInterval);
            if (timerInterval) clearInterval(timerInterval);
            
            document.getElementById('setup').classList.remove('hidden');
            document.getElementById('waiting').classList.add('hidden');
            document.getElementById('running').classList.add('hidden');
            document.getElementById('finished').classList.add('hidden');
            
            document.getElementById('announcement').textContent = '';
            halfTimeAnnounced = false;
            fiveMinAnnounced = false;
        }
    </script>
</body>
</html>
